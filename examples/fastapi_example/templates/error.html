<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <link
      rel="stylesheet"
      href="https://cdn.staticfile.org/bootstrap/5.1.3/css/bootstrap.min.css"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
      }
      .error-icon {
        text-align: center;
        font-size: 72px;
        color: #f44336;
        margin: 20px 0;
      }
      .card {
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }
      .error-message {
        background: #fff9f9;
        border: 1px solid #ffebee;
        border-radius: 4px;
        padding: 15px;
        margin-top: 20px;
        color: #d32f2f;
      }
      .back-btn {
        margin-top: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>{{ title }}</h1>

      <div class="card">
        <div class="card-body">
          <div class="error-icon"><i class="bi bi-x-circle-fill"></i>✗</div>

          <div class="text-center">
            <h3>支付失败</h3>
            <p>很抱歉，您的支付请求处理过程中出现了问题。</p>
          </div>

          <div class="error-message">
            <h4>错误信息</h4>
            <p>{{ error_message }}</p>
          </div>

          <div class="back-btn">
            <a href="/" class="btn btn-primary">返回首页</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
